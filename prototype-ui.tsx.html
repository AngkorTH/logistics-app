  '/dashboard': DashboardPage, '/fleet-dispatch': FleetDispatchPage, '/financial-report': FinancialReportPage,
  '/user-management': UserManagementPage, '/vehicle-inventory': VehicleInventoryPage,
  '/trip-history': TripHistoryPage, '/correction-log': CorrectionLogPage,
  '/profile-settings': ProfileSettingsPage,
};
const PAGE_TITLE = Object.fromEntries(NAV.map(n=>[n.path, n.th]));

/* ============================================================
   LOGIN SCREEN
   ============================================================ */
function LoginScreen({ users, onLogin, kicked }) {
  const [ident, setIdent] = useState('');
  const [err, setErr] = useState('');
  const quick = users.filter(u=>['D01','SV01','AD01','SA01'].includes(u.id));
  const doLogin = () => {
    const u = users.find(x=> x.phone===ident.trim() || x.empId.toLowerCase()===ident.trim().toLowerCase());
    if (!u) { setErr('ไม่พบเบอร์โทร/รหัสพนักงานนี้'); return; }
    if (!u.active) { setErr('บัญชีนี้ถูกระงับการใช้งาน'); return; }
    onLogin(u);
  };
  return (
    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 to-slate-700 p-4">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-7 fadein">
        <div className="text-center mb-5">
          <div className="text-2xl font-bold text-slate-800">🚛 Logi<span className="text-orange-500">ERP</span></div>
          <div className="text-xs text-slate-400 mt-1">Driver Management System</div>
        </div>
        {kicked && <div className="text-xs bg-red-50 text-red-600 rounded-lg p-2.5 mb-3">⚠️ {kicked}</div>}
        <Field label="เบอร์โทร หรือ รหัสพนักงาน">
          <input className={inputCls} value={ident} onChange={e=>{setIdent(e.target.value);setErr('');}}
            placeholder="เช่น 0810000001 หรือ D01" onKeyDown={e=>e.key==='Enter'&&doLogin()} />
        </Field>
        {err && <div className="text-xs text-red-500 mb-2">{err}</div>}
        <Btn color="slate" className="w-full" onClick={doLogin}>เข้าสู่ระบบ</Btn>
        <div className="mt-5 pt-4 border-t border-slate-100">
          <div className="text-[10px] text-slate-400 mb-2 text-center">— เข้าสู่ระบบด่วน (เดโม) —</div>
          <div className="grid grid-cols-2 gap-2">
            {quick.map(u=>(
              <button key={u.id} onClick={()=>onLogin(u)} className="text-xs border border-slate-200 rounded-lg py-2 hover:bg-slate-50">
                {ROLES[u.role].icon} {ROLES[u.role].th}
              </button>
            ))}
          </div>
        </div>
        <div className="text-[10px] text-slate-400 text-center mt-4">🔐 1 บัญชี = 1 Session (กันแชร์รหัส)</div>
      </div>
    </div>
  );
}

/* ============================================================
   ROOT APP
   ============================================================ */
function App() {
  const store = useStore();
  const [currentUser, setCurrentUser] = useState(null);
  const [route, setRoute] = useState('/dashboard');
  const [assignTruck, setAssignTruck] = useState(null);
  const [reviewTruck, setReviewTruck] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [toast, setToast] = useState(null);
  const [offline, setOffline] = useState(false);
  const [queue, setQueue] = useState([]); // offline upload queue
  const seenUploads = useRef(new Set()); // idempotency guard
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [kicked, setKicked] = useState(''); // ข้อความแจ้งถูกดีดออก (single session)
  const sessionRef = useRef(null); // token ของ session แท็บนี้

  const role = currentUser?.role;
  const whoAmI = currentUser ? `${currentUser.name} (${currentUser.id})` : '';
  const notify = (msg, kind='info') => { setToast({msg,kind}); setTimeout(()=>setToast(null),3500); };
  const patch = (id, fn) => store.setFleet(f=>f.map(t=>t.id===id?fn(t):t));

  // auto-sync queue when back online
  useEffect(()=>{
    if(!offline && queue.length>0){
      const n = queue.length;
      setQueue([]);
      notify(`📶 เน็ตกลับมาแล้ว — Auto-sync ${n} รายการในคิวสำเร็จ`,'green');
      store.log(whoAmI,'Auto-sync Offline Queue','—',`อัปโหลดค้าง ${n} รายการเข้าระบบ`);
    }
  }, [offline]);

  const enqueueIfOffline = (label) => {
    if(offline){ setQueue(q=>[...q,{label,at:Date.now()}]); notify(`📴 ออฟไลน์ — เก็บ "${label}" เข้าคิว จะ sync เมื่อเน็ตกลับมา`,'slate'); return true; }
    return false;
  };

  /* ---- single session: login แท็บ/เครื่องอื่นด้วยบัญชีเดียวกัน → แท็บนี้ถูกดีดออก ----
     ตรวจผ่าน storage event (ยิงเฉพาะแท็บอื่น) เทียบ sessionId ใน localStorage กับ token ของแท็บนี้
     ห้ามเขียน store ใดๆ ตอนถูกดีด — ไม่งั้น sessionId เก่าจะถูก persist ทับแล้วดีดกันไปมา */
  useEffect(()=>{
    const onStorage = (e) => {
      if(e.key!==LS_KEY || !currentUser) return;
      try {
        const st = JSON.parse(e.newValue);
        const me = st?.users?.find(u=>u.id===currentUser.id);
        if(me && me.sessionId && me.sessionId!==sessionRef.current){
          setCurrentUser(null); setRoute('/dashboard');
          setKicked('บัญชีนี้ถูกเข้าใช้งานจากอุปกรณ์อื่น — session เดิมถูกดีดออกอัตโนมัติ (1 บัญชี = 1 Session)');
        }
      } catch(err){}
    };
    window.addEventListener('storage', onStorage);
    return ()=>window.removeEventListener('storage', onStorage);
  }, [currentUser]);

  const handleLogin = (u) => {
    const token = 'S-'+Math.random().toString(36).slice(2,10);
    sessionRef.current = token;
    const hadSession = !!u.sessionId;
    store.setUsers(us=>us.map(x=>x.id===u.id?{...x,sessionId:token}:x)); // ทับ session เก่า = ดีดเครื่องเดิมออก
    setCurrentUser(u); setKicked('');
    store.log(`${u.name} (${u.id})`,'เข้าสู่ระบบ',u.id,`Single session${hadSession?' — ดีด session เก่าออก':''} · ${ROLES[u.role].th}`);
  };

  /* อัปเดตข้อมูล user (โปรไฟล์/รหัสผ่าน/notif) — sync currentUser ของแท็บนี้ด้วย */
  const updateUser = (id, patchObj) => {
    store.setUsers(us=>us.map(x=>x.id===id?{...x,...patchObj}:x));
    if(currentUser?.id===id) setCurrentUser(c=>({...c,...patchObj}));
  };

  /* ---- trip actions ---- */
  const assign = (id, plate, drops, distanceKm) => {
    patch(id, old=>({...old, plate, status:'ORANGE', assignedAt:Date.now(), distanceKm,
      drops:drops.map((d,i)=>({id:i+1,name:d.name,allowance:d.allowance,delivered:false,photo:false,tarp:false,gps:null,fuelReceipt:null,tollReceipt:null}))}));
    const drv = store.users.find(u=>u.id===store.fleet.find(t=>t.id===id).driverId);
    store.log(whoAmI,'จ่ายงาน',id,`ผูกทะเบียน ${plate}, สร้าง ${drops.length} จุดส่ง`);
    notify(`🔔 Push → ${drv?.name}: งานใหม่ (สีส้ม) เตรียมคลุมผ้าใบ`,'orange');
    setAssignTruck(null);
  };
  const finishLoading = (id) => {
    const gps='13.7367, 100.5231';
    patch(id, t=>({...t, status:'GREEN', finishedLoadingAt:Date.now(), tarpaulinDeadline:Date.now()+30e3, tarpEscalated:false}));
    store.log(whoAmI,'ขนของขึ้นเสร็จ',id,`Geo-stamp ต้นทาง GPS: ${gps}`);
    notify('📍 บันทึก GPS ต้นทาง · 🔔 เตือนส่งรูปผ้าใบ (สีเขียว)','green');
  };
  const uploadTarp = (id, dropId) => {
    const key = `tarp-${id}-${dropId}`;
    if(seenUploads.current.has(key)){ notify('⛔ Idempotency: รูปผ้าใบจุดนี้ส่งไปแล้ว','slate'); return; }
    if(enqueueIfOffline(`รูปผ้าใบจุด ${dropId}`)) return;
    seenUploads.current.add(key);
    // อัปผ้าใบแล้ว: รีสตาร์ทตัวจับเวลาไว้รอจุดถัดไป + ล้างธง escalation
    patch(id, t=>({...t, tarpaulinDeadline:Date.now()+30e3, tarpEscalated:false,
      drops:t.drops.map(d=>d.id===dropId?{...d,tarp:true}:d)}));
    store.log(whoAmI,'อัปโหลดรูปผ้าใบ',`${id}/จุด${dropId}`,'Idempotency guard: OK');
    notify(`🖼️ อัปโหลดรูปผ้าใบจุด ${dropId} สำเร็จ`,'blue');
  };
  /* คนขับอัปบิลรายจุด → mock OCR อ่านยอด/วันที่เป็น Draft — รอ Supervisor ยืนยันเท่านั้น (ห้าม auto-commit) */
  const uploadReceipt = (id, dropId, kind) => {
    const key = `rcpt-${kind}-${id}-${dropId}`;
    const field = kind==='fuel'?'fuelReceipt':'tollReceipt';
    const label = kind==='fuel'?'บิลน้ำมัน':'บิลทางหลวง';
    const drop = store.fleet.find(x=>x.id===id)?.drops.find(d=>d.id===dropId);
    if(seenUploads.current.has(key) || drop?.[field]){ notify(`⛔ Idempotency: ${label}จุดนี้ส่งไปแล้ว`,'slate'); return; }
    if(enqueueIfOffline(`${label}จุด ${dropId}`)) return;
    seenUploads.current.add(key);
    const amount = kind==='fuel' ? 1000+Math.floor(Math.random()*1500) : 100+Math.floor(Math.random()*300);
    const date = dateOnly(Date.now());
    patch(id, t=>({...t, drops:t.drops.map(d=>d.id===dropId?{...d,[field]:{amount,date,approved:false}}:d)}));
    store.log(whoAmI,`อัปโหลด${label}`,`${id}/จุด${dropId}`,`OCR Draft: ${money(amount)} (${date}) — รอ Supervisor ยืนยัน`);
    notify(`🤖 OCR อ่าน${label}จุด ${dropId}: ${money(amount)} (Draft รอยืนยัน)`,'blue');
  };
  /* Supervisor ยืนยัน/แก้ยอด Draft — ค่าถึงจะถูกนับเข้า payout */
  const approveReceipt = (id, dropId, kind, amount) => {
    const field = kind==='fuel'?'fuelReceipt':'tollReceipt';
    const label = kind==='fuel'?'ค่าน้ำมัน':'ค่าทางหลวง';
    const r = store.fleet.find(x=>x.id===id)?.drops.find(d=>d.id===dropId)?.[field];
    if(!r || r.approved) return; // dedupe: อนุมัติซ้ำไม่ได้
    const finalAmt = amount ?? r.amount;
    const corrected = finalAmt !== r.amount;
    patch(id, t=>({...t, drops:t.drops.map(d=>d.id===dropId?{...d,[field]:{...d[field],amount:finalAmt,approved:true}}:d)}));
    store.log(whoAmI, corrected?'แก้ยอด OCR แล้วอนุมัติ':'OCR อนุมัติ Draft', `${id}/จุด${dropId}`,
      `${label} = ${money(finalAmt)}${corrected?` (แก้จาก ${money(r.amount)})`:''}`);
  };
  /* Escalation ผ้าใบ: หมดเวลา → log + แจ้ง Supervisor + ปักธงบนแดชบอร์ด (ยิงครั้งเดียวต่อรอบ) */
  const escalateTarp = (id) => {
    const t = store.fleet.find(x=>x.id===id);
    if(!t || t.tarpEscalated || t.status!=='GREEN') return;
    patch(id, x=>({...x, tarpEscalated:true}));
    store.log('ระบบ','Escalation: เกินเวลาส่งรูปผ้าใบ',id,'แจ้งเตือน Supervisor อัตโนมัติ + ปักธงบนแดชบอร์ด');
    notify('🚩 Escalation: เกินเวลาผ้าใบ — แจ้งเตือน Supervisor แล้ว','red');
  };
  // Watchdog กลาง: escalation ต้องยิงแม้ไม่มีการ์ดรถ (TarpaulinTimer) render อยู่ เช่นตอนดู list หน้าจัดรถ
  useEffect(()=>{
    const i = setInterval(()=>{
      store.fleet.forEach(t=>{
        if(t.status==='GREEN' && !t.tarpEscalated && t.tarpaulinDeadline && Date.now()>t.tarpaulinDeadline){
          const cur = t.drops.find(d=>!(d.delivered&&d.photo));
          if(cur && !cur.tarp) escalateTarp(t.id);
        }
      });
    }, 2000);
    return ()=>clearInterval(i);
  }, [store.fleet]);
  /* ส่งของ: จุดส่งเรียงตามลำดับ — ข้ามลำดับได้แต่ต้องยืนยันก่อน (เตือน ไม่บล็อก) */
  const uploadProof = (id, dropId) => {
    const t = store.fleet.find(x=>x.id===id);
    const skipped = (t?.drops||[]).filter(d=>d.id<dropId && !(d.delivered&&d.photo));
    if(skipped.length){
      setConfirm({ title:'⚠️ ส่งข้ามลำดับจุดส่ง',
        body:`จุดที่ ${skipped.map(d=>d.id).join(', ')} ยังไม่ส่งของ ปกติต้องส่งเรียงตามลำดับ — ยืนยันส่งจุดที่ ${dropId} ก่อนหรือไม่?`,
        okText:'ยืนยันส่งข้ามลำดับ', onOk:()=>{ setConfirm(null); doUploadProof(id, dropId, true); } });
      return;
    }
    doUploadProof(id, dropId, false);
  };
  const doUploadProof = (id, dropId, skipOrder) => {
    const key = `proof-${id}-${dropId}`;
    if(seenUploads.current.has(key)){ notify('⛔ Idempotency: รูปจุดนี้ส่งไปแล้ว','slate'); return; }
    if(enqueueIfOffline(`รูปส่งจุด ${dropId}`)) return;
    seenUploads.current.add(key);
    const gps = `13.${6+dropId}${dropId}84, 100.6${dropId}00`;
    patch(id, t=>({...t, drops:t.drops.map(d=>d.id===dropId?{...d,delivered:true,photo:true,gps,deliveredAt:Date.now()}:d)}));
    store.log(whoAmI,'อัปโหลดรูปส่งสำเร็จ',`${id}/จุด${dropId}`,`Geo-stamp ปลายทาง GPS: ${gps}${skipOrder?' · ส่งข้ามลำดับ (ยืนยันแล้ว)':''}`);
    notify(`📍 จุดส่ง ${dropId}: บันทึกรูป + GPS ปลายทาง`,'green');
  };
  const saveFinance = (id, data) => {
    patch(id, t=>({...t, ...data}));
    store.log(whoAmI,'คีย์ข้อมูลการเงิน',id,`โบนัส ${money(data.bonus)}${data.penalty>0?`, หัก ${money(data.penalty)} จากเบี้ยเลี้ยงทริป (${data.penaltyReason})`:''}`);
    if(data.penalty>0){
      store.log('ระบบ','แจ้งเตือน Admin (หักเงิน)',id,`หัก ${money(data.penalty)} จากเบี้ยเลี้ยงทริป — เหตุผล: ${data.penaltyReason}`);
      notify(`🔔 แจ้ง Admin: หักเงิน ${money(data.penalty)} (${data.penaltyReason})`,'red');
    } else notify('💾 บันทึกข้อมูลการเงินแล้ว','green');
  };
  const closeTrip = (t) => {
    const allDone = t.drops.every(d=>d.delivered && d.photo);
    if(!allDone){
      setConfirm({ title:'⚠️ ยังส่งของไม่ครบทุกจุด',
        body:`รถ ${t.plate} ยังอัปโหลดรูปส่งไม่ครบทุกจุดย่อย การกดปิดงานตอนนี้เป็นการข้ามขั้นตอน (Manual Override) — ยืนยันหรือไม่?`,
        okText:'ยืนยัน Override', onOk:()=>doClose(t,true) });
      return;
    }
    setConfirm({ title:'🔒 ยืนยันปิดงาน', body:`ปิดงาน ${t.id} และล็อกยอดเงิน ${money(computePayout(t).total)} ถาวร (Freeze on Close) — ยืนยันหรือไม่?`,
      okText:'ปิดงาน', onOk:()=>doClose(t,false) });
  };
  const doClose = (t, override) => {
    const payout = computePayout(t);
    const drv = store.users.find(u=>u.id===t.driverId);
    // move to history (frozen) — freeze ยอดรวมน้ำมัน/ทางหลวง + เก็บหลักฐานรายจุดตามจริง
    const rec = { id:'H-'+Math.floor(Math.random()*900+100), driverId:t.driverId, driver:drv?.name, plate:t.plate,
      closedAt:Date.now(), distanceKm:t.distanceKm,
      fuel:payout.fuel, toll:payout.toll, bonus:t.bonus, penalty:t.penalty, penaltyReason:t.penaltyReason,
      drops:t.drops.map(d=>({id:d.id, name:d.name, allowance:d.allowance, photo:!!d.photo, tarp:!!d.tarp, gps:d.gps||null,
        fuel:d.fuelReceipt?.approved ? d.fuelReceipt.amount : 0, toll:d.tollReceipt?.approved ? d.tollReceipt.amount : 0})),
      frozen:true, override };
    store.setHistory(h=>[rec, ...h]);
    // Scheduled Backup: สำรองข้อมูลการเงินอัตโนมัติทุกครั้งที่ปิดทริป
    store.snapshot(`ปิดทริป ${t.id} → ${rec.id}`, [rec, ...store.history], store.corrections);
    // reset truck to white
    patch(t.id, old=>({...old, status:'WHITE', plate:null, drops:[], bonus:0, penalty:0, penaltyReason:'',
      tarpaulinDeadline:null, tarpEscalated:false, distanceKm:0, assignedAt:null, finishedLoadingAt:null}));
    // clear idempotency keys for this trip
    [...seenUploads.current].forEach(k=>{ if(k.includes(t.id)) seenUploads.current.delete(k); });
    store.log(whoAmI, override?'ปิดงาน (Override ข้ามขั้นตอน)':'ปิดงาน', t.id, `Freeze on Close: ล็อกยอด ${money(payout.total)} ถาวร`);
    notify(`🔒 ปิดงาน ${t.id} → สีขาว · ยอดเงินล็อกถาวร · สำรองข้อมูลแล้ว`,'slate');
    setConfirm(null);
  };
  /* ขอปลดล็อกแก้ตัวเลขทริปที่ปิดแล้ว — ทางเดียวที่แตะเงิน frozen ได้ ต้องผ่าน Super Admin */
  const requestCorrection = (h, fieldKey, fieldLabel, oldVal, newVal, reason) => {
    const id = 'C-'+String(store.corrections.length+1).padStart(2,'0');
    store.setCorr(c=>[{ id, tripId:h.id, requestedBy:currentUser.id, requesterName:currentUser.name,
      fieldKey, field:fieldLabel, oldVal, newVal, reason, status:'PENDING', at:Date.now(), approvedBy:null, approvedAt:null }, ...c]);
    store.log(whoAmI,'ยื่นคำขอแก้ไข (Correction)',h.id,`${fieldLabel}: ${money(oldVal)} → ${money(newVal)} — ${reason}`);
    notify('📨 ส่งคำขอปลดล็อกให้ Super Admin แล้ว','blue');
  };
  const logout = () => { setCurrentUser(null); setRoute('/dashboard'); };

  if(!currentUser) return <LoginScreen users={store.users} onLogin={handleLogin} kicked={kicked} />;

  const ctx = { ...store, role, currentUser, whoAmI, notify, updateUser, go:setRoute,
    openAssign:setAssignTruck, openReview:setReviewTruck, assign, finishLoading,
    uploadTarp, uploadReceipt, approveReceipt, uploadProof, escalateTarp,
    saveFinance, closeTrip, requestCorrection, logout };
  const visibleNav = NAV.filter(n=>n.roles.includes(role));
  const PageComp = PAGES[route] || DashboardPage;

  return (
    <AppCtx.Provider value={ctx}>
      <div className="min-h-screen flex bg-slate-100">
        {/* SIDEBAR */}
        <aside className={`fixed md:static z-40 inset-y-0 left-0 w-60 bg-slate-900 text-slate-300 flex flex-col transition-transform ${sidebarOpen?'translate-x-0':'-translate-x-full md:translate-x-0'}`}>
          <div className="px-5 py-5 border-b border-slate-800">
            <div className="font-bold text-white text-lg">🚛 Logi<span className="text-orange-400">ERP</span></div>
            <div className="text-[10px] text-slate-500 mt-0.5">Driver Management System</div>
          </div>
          <nav className="flex-1 py-3 overflow-y-auto">
            {visibleNav.map(n=>(
              <button key={n.path} onClick={()=>{setRoute(n.path);setSidebarOpen(false);}}
                className={`w-full flex items-center gap-3 px-5 py-2.5 text-sm ${n.path===route?'bg-slate-800 text-white border-l-2 border-orange-400':'hover:bg-slate-800/50'}`}>
                <span>{n.icon}</span><span>{n.th}</span>
              </button>
            ))}
          </nav>
          <div className="px-5 py-3 border-t border-slate-800 text-[10px] text-slate-500">
            🔐 Single Session · 1 อุปกรณ์/บัญชี<br/>เข้าระบบ: {clockTime(Date.now())}
            <button onClick={store.resetDemo} className="block mt-2 text-slate-400 hover:text-white underline">↺ รีเซ็ตข้อมูลเดโม</button>
          </div>
        </aside>
        {sidebarOpen && <div className="fixed inset-0 bg-black/30 z-30 md:hidden" onClick={()=>setSidebarOpen(false)}></div>}

        {/* MAIN */}
        <div className="flex-1 flex flex-col min-w-0">
          <header className="bg-white border-b border-slate-200 px-4 md:px-6 py-3 flex items-center justify-between gap-3 sticky top-0 z-20">
            <div className="flex items-center gap-3 min-w-0">
              <button className="md:hidden text-slate-500 text-xl" onClick={()=>setSidebarOpen(true)}>☰</button>
              <div className="min-w-0">
                <h1 className="font-bold text-slate-800 text-lg truncate">{PAGE_TITLE[route]}</h1>
                <div className="text-xs text-slate-400 truncate">{route}</div>
              </div>
            </div>
            <div className="flex items-center gap-2 md:gap-3">
              {/* offline toggle */}
              <button onClick={()=>setOffline(!offline)}
                className={`text-xs px-2.5 py-1.5 rounded-lg font-medium ${offline?'bg-red-100 text-red-600':'bg-emerald-100 text-emerald-700'}`}>
                {offline?`📴 ออฟไลน์${queue.length?` (${queue.length})`:''}`:'📶 ออนไลน์'}
              </button>
              <div className="hidden sm:block text-right">
                <div className="text-sm font-medium text-slate-700">{currentUser.name}</div>
                <div className="text-[10px] text-slate-400">{ROLES[role].icon} {ROLES[role].th}</div>
              </div>
              <button onClick={logout} className="w-9 h-9 rounded-full bg-slate-800 text-white text-sm font-bold" title="ออกจากระบบ">{currentUser.name[0]}</button>
            </div>
          </header>

          <main className="flex-1 overflow-y-auto p-4 md:p-6 pb-20 md:pb-6">
            <PageComp />
          </main>

          {/* MOBILE BOTTOM NAV */}
          <nav className="md:hidden fixed bottom-0 inset-x-0 bg-white border-t border-slate-200 flex justify-around py-1.5 z-20">
            {visibleNav.slice(0,5).map(n=>(
              <button key={n.path} onClick={()=>setRoute(n.path)}
                className={`flex flex-col items-center text-[10px] px-2 py-1 ${n.path===route?'text-orange-500':'text-slate-400'}`}>
                <span className="text-lg">{n.icon}</span>{n.th}
              </button>
            ))}
          </nav>
        </div>

        {/* MODALS */}
        {assignTruck && <AssignModal truck={assignTruck} onClose={()=>setAssignTruck(null)} />}
        {reviewTruck && <ReviewModal truck={store.fleet.find(t=>t.id===reviewTruck.id)} onClose={()=>setReviewTruck(null)} />}
        {confirm && (
          <Modal title={confirm.title} onClose={()=>setConfirm(null)}>
            <p className="text-sm text-slate-600 mb-4">{confirm.body}</p>
            <div className="flex gap-2">
              <Btn color="outline" className="flex-1" onClick={()=>setConfirm(null)}>ยกเลิก</Btn>
              <Btn color={confirm.okText?.includes('Override')?'red':'slate'} className="flex-1" onClick={confirm.onOk}>{confirm.okText||'ยืนยัน'}</Btn>
            </div>
          </Modal>
        )}
        {toast && (
          <div className="fixed bottom-20 md:bottom-6 left-1/2 -translate-x-1/2 z-50 bg-slate-900 text-white text-sm px-4 py-2.5 rounded-xl shadow-lg max-w-[90vw] text-center fadein">
            {toast.msg}
          </div>
        )}
      </div>
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
  // Compile the JSX source with the CLASSIC runtime (uses global React.createElement),
  // avoiding the automatic runtime's `import ... from "react/jsx-runtime"` which is
  // illegal inside a plain <script> and would silently blank the page.
  (function () {
    function boot() {
      try {
        var src = document.getElementById('app-src').textContent;
        var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
        var s = document.createElement('script');
        s.textContent = out;
        document.body.appendChild(s);
      } catch (e) {
        document.getElementById('root').innerHTML =
          '<pre style="padding:16px;color:#b91c1c;white-space:pre-wrap;font-family:monospace">' +
          'เกิดข้อผิดพลาดในการโหลด: ' + (e && e.message ? e.message : e) + '</pre>';
        console.error(e);
      }
    }
    if (window.Babel) boot();
    else window.addEventListener('load', boot);
  })();
</script>
</body>
</html>
